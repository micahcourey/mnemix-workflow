name: Publish Python

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: pytest

  build-sdist:
    name: Build source distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build twine

      - name: Build source distribution
        working-directory: python
        run: python -m build --sdist

      - name: Validate package metadata
        working-directory: python
        run: python -m twine check --strict dist/*

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  build-bundled-wheels:
    name: Build bundled wheel (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            workflow_binary: /tmp/mnemix-workflow-publish-linux-release/release/mnemix-workflow
            mxw_binary: /tmp/mnemix-workflow-publish-linux-release/release/mxw
            mnx_binary: /tmp/mnemix-workflow-publish-linux-release/release/mnx
            cargo_target_dir: /tmp/mnemix-workflow-publish-linux-release
          - os: macos-latest
            label: macos-arm64
            workflow_binary: target/release/mnemix-workflow
            mxw_binary: target/release/mxw
            mnx_binary: target/release/mnx
            cargo_target_dir: target
          - os: windows-latest
            label: windows-x86_64
            workflow_binary: target/release/mnemix-workflow.exe
            mxw_binary: target/release/mxw.exe
            mnx_binary: target/release/mnx.exe
            cargo_target_dir: target

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Cache cargo artifacts
        if: matrix.label != 'linux-x86_64'
        uses: Swatinem/rust-cache@v2

      - name: Build CLI release binaries
        env:
          CARGO_TARGET_DIR: ${{ matrix.cargo_target_dir }}
        run: cargo build --release --bin mnemix-workflow --bin mxw --bin mnx

      - name: Build and verify bundled wheel
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ matrix.cargo_target_dir }}
          PYTHON_BIN: python
          TP_WORKFLOW_BINARY: ${{ matrix.workflow_binary }}
          TP_MXW_BINARY: ${{ matrix.mxw_binary }}
          TP_MNX_BINARY: ${{ matrix.mnx_binary }}
        run: ./scripts/check-python-bundled-wheel.sh

      - name: Upload bundled wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.label }}
          path: python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs:
      - build-sdist
      - build-bundled-wheels
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: Validate all artifacts
        run: python -m twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
